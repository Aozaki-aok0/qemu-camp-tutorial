name: Update Leaderboards

on:
  schedule:
    - cron: '20 18 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-leaderboards
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      UPDATE_BRANCH: automation/update-leaderboards

    steps:
      - name: Check leaderboard token
        env:
          LEADERBOARD_PAT: ${{ secrets.LEADERBOARD_GITHUB_TOKEN }}
        run: |
          if [ -z "$LEADERBOARD_PAT" ]; then
            echo "::error::Set LEADERBOARD_GITHUB_TOKEN so the generated PR merge can trigger the Documentation workflow."
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.LEADERBOARD_GITHUB_TOKEN }}
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate leaderboards
        env:
          LEADERBOARD_GITHUB_TOKEN: ${{ secrets.LEADERBOARD_GITHUB_TOKEN }}
        run: python scripts/leaderboards/update_leaderboards.py --config scripts/leaderboards/config.json

      - name: Check for changes
        id: changes
        run: |
          if [ -z "$(git status --porcelain -- docs/generated/leaderboards docs/leaderboards)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated leaderboards to update branch
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git switch -c "$UPDATE_BRANCH"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/generated/leaderboards docs/leaderboards
          git commit -s -m "docs: update leaderboards"

      - name: Push update branch
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git fetch origin "$UPDATE_BRANCH" || true
          git push --force-with-lease origin "HEAD:$UPDATE_BRANCH"

      - name: Create or update pull request
        id: pr
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.LEADERBOARD_GITHUB_TOKEN }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          pr_number="$(
            gh pr list \
              --head "$UPDATE_BRANCH" \
              --base "$BASE_BRANCH" \
              --state open \
              --json number \
              --jq '.[0].number // ""'
          )"

          if [ -z "$pr_number" ]; then
            pr_url="$(
              gh pr create \
                --base "$BASE_BRANCH" \
                --head "$UPDATE_BRANCH" \
                --title "docs: update leaderboards" \
                --body "Refresh the generated 2026 leaderboard Markdown pages and JSON snapshot.

After this PR merges, the Documentation workflow renders the updated site."
            )"
            pr_number="${pr_url##*/}"
          fi

          echo "number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "Pull request #$pr_number is ready for auto-merge."

      - name: Enable auto-merge
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.LEADERBOARD_GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: gh pr merge "$PR_NUMBER" --rebase --auto --delete-branch
